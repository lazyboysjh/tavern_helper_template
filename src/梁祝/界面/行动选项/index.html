<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>梁祝行动选项</title>
</head>
<body style="margin:0;padding:0;background:transparent;">
<style>
/* mnx-opts v16 — glass capsule tag (scene-collapse style) + dual-end */
.mnx-opts-wrap{
  position:relative;display:flex;flex-direction:column;gap:8px;
  margin:12px 0;padding:13px 12px 11px;border-radius:16px;overflow:hidden;
  border:1px solid rgba(255,255,255,.07);
  background:
    radial-gradient(ellipse 88% 58% at 50% 0,rgba(196,132,82,.09),transparent 56%),
    linear-gradient(165deg,rgba(16,13,12,.8),rgba(7,7,9,.9)),
    url('https://raw.githubusercontent.com/lazyboysjh/image/main/20260605013645147.png') center/cover no-repeat;
  box-shadow:0 14px 36px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  font-family:"Microsoft YaHei","PingFang SC","Hiragino Sans GB","SimSun",serif;
}
.mnx-opts-wrap::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background:linear-gradient(120deg,rgba(255,255,255,.03),transparent 30%),repeating-linear-gradient(135deg,rgba(255,255,255,.01) 0 1px,transparent 1px 14px);
  opacity:.7;
}

.mnx-opts-head{
  position:relative;z-index:1;display:flex;align-items:center;gap:10px;
  padding:0 2px 3px;
}
.mnx-opts-head::before,.mnx-opts-head::after{
  content:"";flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(184,148,101,.28),transparent);
}
.mnx-opts-head-core{
  display:inline-flex;align-items:center;gap:8px;flex-shrink:0;
}
.mnx-opts-title{
  font-size:.58rem;font-weight:600;letter-spacing:.3em;
  color:rgba(232,210,176,.56);white-space:nowrap;
}
.mnx-mode-btn{
  flex:0 0 auto;min-height:24px;padding:3px 10px;border-radius:999px;cursor:pointer;
  border:1px solid rgba(184,148,101,.32);
  background:linear-gradient(135deg,rgba(184,148,101,.16),rgba(0,0,0,.18));
  color:rgba(241,232,220,.92);font-size:.58rem;font-weight:800;letter-spacing:.06em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 2px 8px rgba(0,0,0,.1);
  transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease,color .2s ease;
  pointer-events:auto;position:relative;z-index:2;
}
.mnx-mode-btn:hover{transform:translateY(-1px);border-color:rgba(196,132,82,.48);color:#fff8f0;}
.mnx-opts-wrap .opt-send-source{display:none!important;}
.mnx-opts-wrap .opt-display-source{
  display:block;flex:1 1 auto;min-width:0;align-self:center;
  font-size:.9rem;line-height:1.56;color:rgba(241,232,220,.94);
  letter-spacing:.02em;word-break:break-word;overflow-wrap:anywhere;white-space:normal;
}
.mnx-opts-wrap .opt::after{content:none!important;}
:root[data-theme="light"] .mnx-opts-title{color:rgba(139,43,43,.44);}
:root[data-theme="light"] .mnx-mode-btn{
  border-color:rgba(139,43,43,.18);background:linear-gradient(135deg,rgba(255,252,248,.95),rgba(244,239,230,.88));color:#5a2424;
}
@media (max-width:760px){
  .mnx-opts-head-core{gap:6px;}
  .mnx-opts-title{font-size:.54rem;letter-spacing:.22em;}
  .mnx-mode-btn{min-height:22px;padding:2px 8px;font-size:.54rem;}
}

.mnx-opts-head{
  position:relative;z-index:1;display:flex;align-items:center;gap:10px;
  font-size:.58rem;font-weight:600;letter-spacing:.3em;
  color:rgba(232,210,176,.56);padding:0 2px 3px;
}
.mnx-opts-head::before,.mnx-opts-head::after{
  content:"";flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(184,148,101,.28),transparent);
}
.mnx-opts-wrap .opt{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:12px;
  min-height:48px;padding:10px 13px 10px 11px;border-radius:14px;cursor:pointer;
  border:1px solid rgba(255,255,255,.06);
  background:linear-gradient(135deg,rgba(255,255,255,.045),rgba(0,0,0,.14));
  box-shadow:0 8px 22px rgba(0,0,0,.16),inset 0 1px 0 rgba(255,255,255,.04);
  transition:transform .24s cubic-bezier(.22,1,.36,1),box-shadow .24s ease,border-color .24s ease,background .24s ease;
  color:transparent!important;font-size:0!important;line-height:0!important;
}
.mnx-opts-wrap .opt::before{
  content:var(--opt-label,"选择");
  display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;
  min-height:28px;padding:5px 12px;border-radius:999px;
  font-size:.62rem;font-weight:800;letter-spacing:.14em;line-height:1.15;
  color:color-mix(in srgb,var(--opt-accent,#b89465) 72%,#fff8f0);
  text-shadow:0 1px 2px rgba(0,0,0,.22);
  background:linear-gradient(135deg,color-mix(in srgb,var(--opt-accent,#b89465) 18%,transparent),rgba(255,255,255,.035));
  border:1px solid color-mix(in srgb,var(--opt-accent,#b89465) 32%,rgba(255,255,255,.1));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 4px 12px rgba(0,0,0,.1);
  white-space:nowrap;
}
.mnx-opts-wrap .opt::after{
  content:attr(data-display);
  display:block;flex:1 1 auto;min-width:0;align-self:center;
  font-size:.9rem;line-height:1.56;color:rgba(241,232,220,.94);
  letter-spacing:.02em;word-break:break-word;overflow-wrap:anywhere;white-space:normal;
}
.mnx-opts-wrap .opt:hover{
  transform:translateY(-1px);
  border-color:color-mix(in srgb,var(--opt-accent,#b89465) 28%,rgba(255,255,255,.1));
  background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(0,0,0,.12));
  box-shadow:0 12px 26px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.06);
}
.mnx-opts-wrap .opt:hover::before{
  background:linear-gradient(135deg,color-mix(in srgb,var(--opt-accent,#b89465) 24%,transparent),rgba(255,255,255,.05));
  border-color:color-mix(in srgb,var(--opt-accent,#b89465) 42%,rgba(255,255,255,.12));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 6px 14px rgba(0,0,0,.14);
}
.mnx-opts-wrap .opt.main{--opt-accent:#c6764a;--opt-label:"日常";}
.mnx-opts-wrap .opt.explore{--opt-accent:#4f7a78;--opt-label:"探查";}
.mnx-opts-wrap .opt.intimacy{--opt-accent:#c06a86;--opt-label:"暧昧";}
.mnx-opts-wrap .opt.nsfw{--opt-accent:#8c3b32;--opt-label:"欲事";}
.mnx-opts-wrap .opt.main::after{font-weight:700;color:#fff9f2;letter-spacing:.025em;}
:root[data-theme="light"] .mnx-opts-wrap{
  border-color:rgba(67,52,36,.09);
  background:
    radial-gradient(ellipse 88% 55% at 50% 0,rgba(139,43,43,.05),transparent 58%),
    linear-gradient(165deg,rgba(255,252,248,.92),rgba(244,239,230,.9)),
    url('https://raw.githubusercontent.com/lazyboysjh/image/main/20260605013645147.png') center/cover no-repeat;
  box-shadow:0 10px 28px rgba(67,52,36,.07),inset 0 1px 0 rgba(255,255,255,.82);
}
:root[data-theme="light"] .mnx-opts-wrap::before{opacity:.5;}
:root[data-theme="light"] .mnx-opts-head{color:rgba(139,43,43,.44);}
:root[data-theme="light"] .mnx-opts-head::before,:root[data-theme="light"] .mnx-opts-head::after{background:linear-gradient(90deg,transparent,rgba(139,43,43,.18),transparent);}
:root[data-theme="light"] .mnx-opts-wrap .opt{
  background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(250,246,240,.96));
  border-color:rgba(67,52,36,.08);
  box-shadow:0 4px 14px rgba(67,52,36,.05),inset 0 1px 0 rgba(255,255,255,.88);
}
:root[data-theme="light"] .mnx-opts-wrap .opt::before{
  color:color-mix(in srgb,var(--opt-accent,#8b2b2b) 70%,#4a3228);
  text-shadow:none;
  background:linear-gradient(135deg,color-mix(in srgb,var(--opt-accent,#8b2b2b) 12%,rgba(255,255,255,.92)),rgba(255,255,255,.72));
  border-color:color-mix(in srgb,var(--opt-accent,#8b2b2b) 22%,rgba(67,52,36,.12));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 2px 8px rgba(67,52,36,.06);
}
:root[data-theme="light"] .mnx-opts-wrap .opt::after{color:#342c26;}
:root[data-theme="light"] .mnx-opts-wrap .opt.main::after{color:#5a2424;}
@media (max-width:760px){
  .mnx-opts-wrap{margin:8px 0;padding:10px 8px 8px;gap:7px;border-radius:13px;background-attachment:scroll;}
  .mnx-opts-head{font-size:.54rem;letter-spacing:.22em;}
  .mnx-opts-wrap .opt{gap:10px;min-height:44px;padding:8px 10px 8px 9px;border-radius:12px;}
  .mnx-opts-wrap .opt::before{min-height:26px;padding:4px 10px;font-size:.56rem;letter-spacing:.1em;}
  .mnx-opts-wrap .opt::after{font-size:.82rem;line-height:1.5;}
}
@media (max-width:360px){
  .mnx-opts-wrap .opt{gap:8px;padding:7px 8px;}
  .mnx-opts-wrap .opt::before{padding:4px 8px;font-size:.54rem;letter-spacing:.08em;}
  .mnx-opts-wrap .opt::after{font-size:.8rem;line-height:1.46;}
}
@media (min-width:761px){
  .mnx-opts-wrap .opt{min-height:50px;padding:11px 15px 11px 12px;gap:14px;}
  .mnx-opts-wrap .opt::after{font-size:.92rem;line-height:1.58;}
}
.mnx-opts-wrap.mnx-opts-archived{display:none!important;}

/* liangzhu-options-mobile-final */
@media (max-width:760px){
  .mnx-mode-btn{min-height:44px!important;padding:7px 12px!important;font-size:.58rem!important;}
}
@media (hover:none),(pointer:coarse){
  .mnx-mode-btn{min-width:88px;min-height:44px!important;}
  .mnx-opts-wrap .opt{min-height:48px;}
  .mnx-mode-btn:hover,.mnx-opts-wrap .opt:hover{transform:none!important;}
}
@media (prefers-reduced-motion:reduce){
  .mnx-mode-btn,.mnx-opts-wrap,.mnx-opts-wrap .opt{transition:none!important;animation:none!important;}
}

</style>
<div class="mnx-opts-wrap"><div class="mnx-opts-head"><span class="mnx-opts-head-core"><span class="mnx-opts-title">行动抉择</span><button type="button" class="mnx-mode-btn">直接发送</button></span></div>$1<script>
(function(){
  var wrap = document.currentScript && document.currentScript.closest('.mnx-opts-wrap');
  if (!wrap) return;
  if (wrap.getAttribute('data-mnx-controller-ready') === '1') return;
  wrap.setAttribute('data-mnx-controller-ready','1');
  wrap.setAttribute('data-mnx-inline','1');

  var LOG_PREFIX = '[梁祝:UI][options]';
  function log(level, message, detail) {
    var fn = console[level] || console.log;
    if (detail === undefined) fn.call(console, LOG_PREFIX, message);
    else fn.call(console, LOG_PREFIX, message, detail);
  }

  function getApi(name) {
    try { if (typeof window[name] === 'function') return window[name].bind(window); } catch(e) {}
    try { if (window.parent && typeof window.parent[name] === 'function') return window.parent[name].bind(window.parent); } catch(e) {}
    try { if (window.top && typeof window.top[name] === 'function') return window.top[name].bind(window.top); } catch(e) {}
    return null;
  }
  function cleanText(s) {
    return String(s || '').replace(/<\/?q>/gi, '').replace(/&lt;\/?q&gt;/gi, '').trim();
  }

  function getHostingMessageId() {
    try {
      var node = wrap;
      while (node && node !== document) {
        if (node.classList && node.classList.contains('mes')) break;
        node = node.parentElement;
      }
      if (!node) return null;
      var id = node.getAttribute('mesid') || node.getAttribute('data-mesid') || node.dataset.mesid;
      return id != null ? Number(id) : null;
    } catch(e) { return null; }
  }
  function getLatestAssistantMessageId() {
    var getMessages = getApi('getChatMessages');
    if (getMessages) {
      try {
        var messages = getMessages('0-{{lastMessageId}}', { role:'assistant' }) || [];
        if (messages.length) return Number(messages[messages.length - 1].message_id);
      } catch(e) {
        log('warn', 'assistant message lookup failed', e);
      }
    }
    return null;
  }
  function mnxEnsureLatestOptions() {
    var host = getHostingMessageId();
    var latest = getLatestAssistantMessageId();
    if (host == null || latest == null) return true;
    if (Number(host) !== Number(latest)) {
      wrap.classList.add('mnx-opts-archived');
      wrap.style.display = 'none';
      log('info', 'archive stale options', { host: host, latest: latest });
      return false;
    }
    return true;
  }
  window.mnxEnsureLatestOptions = mnxEnsureLatestOptions;

  var modeBtn = wrap.querySelector('.mnx-mode-btn');
  var MODES = ['send','setinput','append'];
  var MODE_LABELS = { send:'模式：发送', setinput:'模式：填入', append:'模式：追加' };
  var MODE_KEY = 'liangzhu-opts-mode-v4';
  var currentMode = 'send';
  try { var saved = localStorage.getItem(MODE_KEY); if (MODES.indexOf(saved) >= 0) currentMode = saved; } catch(e) {}
  function applyMode(mode) {
    if (MODES.indexOf(mode) === -1) mode = 'send';
    currentMode = mode;
    wrap.setAttribute('data-mode', mode);
    if (modeBtn) {
      modeBtn.textContent = MODE_LABELS[mode];
      modeBtn.setAttribute('title', '点击切换：发送 / 填入 / 追加');
      modeBtn.setAttribute('aria-label', MODE_LABELS[mode]);
    }
    try { localStorage.setItem(MODE_KEY, mode); } catch(e) {}
    log('info', 'mode changed', mode);
  }
  function getTrigger() {
    if (typeof triggerSlash === 'function') return triggerSlash;
    try { if (window.parent && typeof window.parent.triggerSlash === 'function') return window.parent.triggerSlash.bind(window.parent); } catch(e) {}
    try { if (window.top && typeof window.top.triggerSlash === 'function') return window.top.triggerSlash.bind(window.top); } catch(e) {}
    return null;
  }
  function getInput() {
    try { if (window.parent && window.parent.$) return window.parent.$('#send_textarea').val() || ''; } catch(e) {}
    try { if (window.top && window.top.$) return window.top.$('#send_textarea').val() || ''; } catch(e) {}
    return '';
  }
  applyMode(currentMode);
  log('info', 'controller ready', {
    mode: currentMode,
    triggerSlash: !!getTrigger(),
    eventOn: !!(getApi('eventOn') || getApi('event_on'))
  });
  if (modeBtn) {
    modeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      e.preventDefault();
      applyMode(MODES[(MODES.indexOf(currentMode) + 1) % MODES.length]);
    });
  }
  wrap.addEventListener('click', async function(e) {
    if (e.target.closest('.mnx-mode-btn')) return;
    var item = e.target.closest('.opt');
    if (!item) return;
    e.preventDefault();
    e.stopPropagation();
    var source = item.querySelector('.opt-send-source') || item.querySelector('.opt-display-source');
    var text = cleanText(source ? source.textContent : item.textContent);
    text = text.replace(/^\d+\.\s*/, '').replace(/^\[[^\]]+\]\s*/, '').trim();
    if (!text || item.getAttribute('data-mnx-sending') === '1') return;
    var trig = getTrigger();
    if (!trig) { log('error', 'triggerSlash unavailable'); return; }
    item.setAttribute('data-mnx-sending','1');
    text = text.replace(/\|/g, '｜');
    try {
      var command = '';
      if (currentMode === 'send') {
        command = '/send ' + text + '|/trigger';
      } else if (currentMode === 'setinput') {
        command = '/setinput ' + text;
      } else if (currentMode === 'append') {
        var cur = getInput();
        command = '/setinput ' + (cur ? cur + '\n' + text : text);
      }
      log('info', 'dispatch', { mode: currentMode, length: text.length });
      await trig(command);
      log('info', 'dispatch complete', currentMode);
      if (currentMode === 'send') {
        item.classList.add('mnx-sent');
        setTimeout(function(){ item.classList.remove('mnx-sent'); }, 900);
      }
    } catch (err) {
      log('error', 'dispatch failed', err);
    } finally {
      item.removeAttribute('data-mnx-sending');
    }
  }, false);

  var eventOnApi = getApi('eventOn') || getApi('event_on');
  if (eventOnApi) {
    var events = null;
    try { events = window.tavern_events || (window.parent && window.parent.tavern_events) || (window.top && window.top.tavern_events); } catch(e) {}
    ['CHAT_CHANGED','MESSAGE_RECEIVED','MESSAGE_SWIPED','MESSAGE_DELETED','MESSAGE_EDITED'].forEach(function(k) {
      var eventName = events && events[k] ? events[k] : k.toLowerCase();
      try { eventOnApi(eventName, mnxEnsureLatestOptions); } catch(e) {
        log('warn', 'event bind failed', { event: k, error: e });
      }
    });
  }
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) mnxEnsureLatestOptions();
  });
  setTimeout(mnxEnsureLatestOptions, 0);
})();

</script></div>
</body>
